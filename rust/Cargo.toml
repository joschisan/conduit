[package]
name = "conduit"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[lints.rust]
unexpected_cfgs = { level = "allow", check-cfg = ['cfg(frb_expand)'] }

[dependencies]
fedimint-bip39 = "0.9.0"
fedimint-core = "0.9.0"
fedimint-client = "0.9.0"
fedimint-rocksdb = "0.9.0"
fedimint-lnv2-client = "0.9.0"
fedimint-lnv2-common = "0.9.0"
fedimint-mint-client = "0.9.0"
flutter_rust_bridge = "=2.10.0"
futures-util = "0.3.30"
lightning-invoice = { version = "0.33.2", features = ["std"] }
lnurl-pay = "0.6.0"
# Pin versions to avoid netwatch/socket2 incompatibility in fedimint 0.9.0
reqwest = { version = "=0.12.22", features = ["rustls-tls", "json"], default-features = false }
serde = { version = "1.0.219", features = ["derive"] }
tokio = "=1.46.1"
hyper-util = "=0.1.14"
surge-ping = "=0.8.2"
socket2 = "=0.5.9"
ur = "0.4.1"
minicbor = { version = "0.19.1", features = ["alloc"] }

[profile.dev.package]
tikv-jemalloc-sys = { opt-level = 3 }
librocksdb-sys = { opt-level = 3 }
secp256k1 = { opt-level = 3}
secp256k1-sys = { opt-level = 3}

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
strip = false
debug = "line-tables-only"

[profile.release.package]
tikv-jemalloc-sys = { opt-level = 3 }
librocksdb-sys = { opt-level = 3 }
secp256k1 = { opt-level = 3}
secp256k1-sys = { opt-level = 3}
